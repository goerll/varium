name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @varium/core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./packages/varium/package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag v$tag_version does not match package version $package_version"
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Publish package
        working-directory: packages/varium
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
